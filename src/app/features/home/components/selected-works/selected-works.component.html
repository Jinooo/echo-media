<section class="works" aria-labelledby="works-heading">
  <div class="works__container">
    <header class="works__header">
      <span class="works__label">Selected Works</span>
      <h2 class="works__heading" id="works-heading">Featured Projects</h2>
    </header>

    <div class="works__filters" role="tablist" aria-label="Filter works by category">
      @for (cat of categories; track cat.key) {
        <button
          class="works__filter-btn"
          [class.works__filter-btn--active]="activeFilter() === cat.key"
          (click)="setFilter(cat.key)"
          role="tab"
          [attr.aria-selected]="activeFilter() === cat.key"
        >
          {{ cat.label }}
        </button>
      }
    </div>

    <div class="works__grid">
      @for (work of filteredWorks(); track work.slug) {
        <a
          [routerLink]="['/works', work.slug]"
          class="works__card"
        >
          <div class="works__card-image">
            <div class="works__card-placeholder">
              <span class="works__card-category">{{ WORK_CATEGORIES[work.category] }}</span>
            </div>
            <div class="works__card-overlay">
              <span class="works__card-view">View Project</span>
            </div>
          </div>
          <div class="works__card-info">
            <h3 class="works__card-title">{{ work.title }}</h3>
            <p class="works__card-meta">
              <span class="works__card-client">{{ work.client }}</span>
              <span class="works__card-separator" aria-hidden="true"></span>
              <span class="works__card-year">{{ work.year }}</span>
            </p>
          </div>
        </a>
      }
    </div>

    <div class="works__cta">
      <a routerLink="/works" class="works__cta-btn">View All Works</a>
    </div>
  </div>
</section>
