<section class="services" aria-labelledby="services-heading">
  <div class="services__container">
    <div class="services__header">
      <p class="services__label">What We Do</p>
      <h2 class="services__heading" id="services-heading">Services</h2>
    </div>

    <div class="services__grid">
      @for (service of services; track service.id) {
        <article class="services__card">
          <span class="services__card-icon" aria-hidden="true">{{ service.icon }}</span>
          <h3 class="services__card-title">{{ service.title }}</h3>
          <p class="services__card-desc">{{ service.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
