<section class="hero" [attr.aria-label]="'hero.sectionAria' | translate">
  <div class="hero__bg">
    <div class="hero__bg-gradient"></div>
    <div class="hero__bg-texture" [style.transform]="'translateY(' + parallaxY() + 'px)'"></div>
  </div>

  <div class="hero__content" [class.is-loaded]="isLoaded()">
    <div class="hero__brands">
      @for (brand of brandLogos; track brand) {
        <span class="hero__brand">{{ brand }}</span>
        @if (!$last) {
          <span class="hero__brand-sep" aria-hidden="true"></span>
        }
      }
    </div>

    <h1 class="hero__title">
      <span class="hero__title-main">Echo Media</span>
      <span class="hero__title-chinese">回声浩淼</span>
      <span class="hero__title-tagline">{{ 'hero.tagline' | translate }}</span>
    </h1>

    <p class="hero__subtitle">
      {{ 'hero.subtitle' | translate }}
    </p>

    <div class="hero__actions">
      <a routerLink="/works" class="hero__btn hero__btn--primary">
        {{ 'hero.viewWorks' | translate }}
        <span class="hero__btn-arrow" aria-hidden="true">→</span>
      </a>
      <a routerLink="/contact" class="hero__btn hero__btn--outline">
        {{ 'hero.contactUs' | translate }}
      </a>
    </div>
  </div>

  <div class="hero__scroll-indicator" aria-hidden="true">
    <span class="hero__scroll-line"></span>
  </div>
</section>
