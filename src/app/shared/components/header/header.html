<header class="header" role="banner">
  <div class="header__container">
    <a
      routerLink="/"
      class="header__logo"
      (click)="closeMenu()"
      [attr.aria-label]="'nav.homeAria' | translate"
    >
      <span class="header__logo-text">Echo<span class="header__logo-accent">.</span>Media</span>
    </a>

    <div class="header__actions">
      <app-lang-switcher />

      <nav
        class="header__nav"
        [class.header__nav--open]="isMenuOpen()"
        [attr.aria-label]="'nav.main' | translate"
      >
        <ul class="header__nav-list">
          @for (link of navLinks; track link.path) {
            <li class="header__nav-item">
              <a
                class="header__nav-link"
                [routerLink]="link.path"
                routerLinkActive="header__nav-link--active"
                (click)="closeMenu()"
              >
                {{ link.labelKey | translate }}
              </a>
            </li>
          }
        </ul>
      </nav>

      <button
        type="button"
        class="header__menu-btn"
        [class.header__menu-btn--open]="isMenuOpen()"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        [attr.aria-label]="'nav.toggle' | translate"
      >
        <span class="header__menu-line"></span>
        <span class="header__menu-line"></span>
        <span class="header__menu-line"></span>
      </button>
    </div>
  </div>
</header>
