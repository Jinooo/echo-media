<footer class="footer">
  <div class="footer__container">
    <div class="footer__brand">
      <span class="footer__logo">ECHO<span class="footer__logo-accent">.</span>MEDIA</span>
      <p class="footer__tagline">Tell The World Your Story</p>
      <div class="footer__social">
        @for (link of socialLinks; track link.label) {
          <a
            [href]="link.href"
            class="footer__social-link"
            [attr.aria-label]="link.label"
            target="_blank"
            rel="noopener noreferrer"
          >
            {{ link.icon }}
            <span class="footer__social-label">{{ link.label }}</span>
          </a>
        }
      </div>
    </div>

    <nav class="footer__nav" aria-label="Footer navigation">
      <ul class="footer__nav-list">
        @for (link of navLinks; track link.path) {
          <li>
            <a [routerLink]="link.path" class="footer__nav-link">{{ link.label }}</a>
          </li>
        }
      </ul>
    </nav>

    <div class="footer__bottom">
      <p class="footer__copyright">© {{ currentYear }} Echo Media. All rights reserved.</p>
    </div>
  </div>
</footer>
